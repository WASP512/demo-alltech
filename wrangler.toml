name = "alltech-site"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# Environment variables set in the Cloudflare Pages dashboard, not committed:
#   CONTACT_FORWARD_TO    - email address contact form submissions are forwarded to
#   ASSESSMENT_FORWARD_TO - sales inbox for gap-assessment results (falls back to CONTACT_FORWARD_TO)
#   CONTACT_FROM          - sender address (must be on a domain verified in Cloudflare Email Routing)
#   TURNSTILE_SECRET     - Cloudflare Turnstile secret key (for spam protection)
# The public Turnstile site key goes in PUBLIC_TURNSTILE_SITE_KEY (PUBLIC_ prefix exposes it to client code).
